     Paste this block at the top of <body> on every page.
     JS and CSS handle all behaviour — nothing else to change here.
====================================================== -->
<div class="cookie-banner" id="cookieBanner">

  <!-- ── INITIAL STATE ── -->
  <div class="cookie-initial" id="cookieInitial">
    <p class="cookie-text">
      Ta strona używa wyłącznie ciasteczek niezbędnych do działania jej funkcji.
      Możesz je odrzucić, ale wtedy niektóre funkcje nie będą dostępne.

    <div class="cookie-btn-row">
      <button class="cookie-btn" id="cookieAccept">akceptuję</button>
      <button class="cookie-btn" id="cookieDecline">odrzucam</button>
    </div>
  </div>

  <!-- ── DECLINED STATE ── -->
  <!-- Hidden by default, shown after "odrzucam" is clicked -->
  <div class="cookie-declined" id="cookieDeclined" style="display:none;">
    <button class="cookie-close" id="cookieClose">x</button>
    <p class="cookie-text">Niektóre funkcje strony są niedostępne.</p>
    <button class="cookie-btn cookie-btn--full" id="cookieReopen">
      &#60; Zmień ustawienia cookies
    </button>
  </div>

</div>

  <!--
    =====================================================
    PHOTO LAYOUT

    HOW THIS WORKS:
    .photo-canvas is a fixed-size container (1440 × 4617.1px)
    matching your Figma frame exactly. It's centred on the
    page — on wide screens there's whitespace on both sides,
    on narrow screens it clips (mobile has its own layout).

    Each photo is positioned absolutely using the X and Y
    coordinates from Figma. To move a photo, just change
    the style values on that <img> tag.

    TO ADD A NEW PHOTO:
    Copy any <img> block below and adjust the five values:
      left   = x from Figma
      top    = y from Figma (minus 249.9 from your Figma value)
      width  = w from Figma
      height = h from Figma
      src    = your filename in the photos/ folder

    Don't forget to update the canvas height in style.css
    if your new photo extends below the current bottom.
    =====================================================
  -->

  <div class="photo-canvas">
